{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="py-2">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1 color-negro-suave-fn">Registrar Nuevo Proyecto</h3>
            <p class="text-muted small mb-0">Configuración inicial del equipo Scrum</p>
        </div>
        <a href="{% url 'proyectos' %}" class="btn btn-outline-secondary fw-bold btn-sm shadow-sm">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card shadow-sm border-0 border-top border-4 h-100" style="border-top-color: #39A900 !important;">
                    <div class="card-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Nombre del Proyecto:</label>
                            <input type="text" name="nombre" class="form-control border-secondary-subtle shadow-none" placeholder="Ej. Sistema de Inventario para el Centro Minero" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-muted text-uppercase">Objetivo General:</label>
                            <textarea name="objetivo" class="form-control border-secondary-subtle shadow-none" rows="5" placeholder="Describa el alcance técnico del software..."></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-uppercase">Fecha Inicio (Sprint 1):</label>
                                <input type="date" name="fecha_inicio" class="form-control border-secondary-subtle shadow-none" required>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body p-4 d-flex flex-column">
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted text-uppercase">Designar Scrum Master:</label>
                            <select name="scrum_master" class="form-select border-secondary-subtle shadow-none" required>
                                <option value="" disabled selected>-- Seleccione al líder --</option>
                                {% for aprendiz in aprendices %}
                                    <option value="{{ aprendiz.id }}">{{ aprendiz.first_name }} {{ aprendiz.last_name }}</option>
                                {% endfor %}
                            </select>
                            <small class="text-muted mt-1 d-block"><i class="bi bi-info-circle me-1"></i>Responsable de gestionar el tablero y las dailies.</small>
                        </div>

                        <div class="flex-grow-1">
                            <label class="form-label fw-bold small text-muted text-uppercase">Seleccionar Integrantes:</label>
                            <div class="border rounded p-3 bg-light" style="max-height: 250px; overflow-y: auto;">
                                {% for aprendiz in aprendices %}
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" name="integrantes" value="{{ aprendiz.id }}" id="ap_{{ aprendiz.id }}">
                                    <label class="form-check-label small" for="ap_{{ aprendiz.id }}">
                                        {{ aprendiz.first_name }} {{ aprendiz.last_name }}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card border-0 shadow-sm color-gris-claro-bg">
                    <div class="card-body d-flex justify-content-end py-3 px-4">
                        <button type="submit" class="btn color-verde-sena-bg text-white fw-bold px-5 shadow-sm">
                            <i class="bi bi-rocket-takeoff me-2"></i>Crear Grupo y Activar Tablero
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
