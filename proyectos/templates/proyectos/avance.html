{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="py-2">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1 color-negro-suave-fn">Registrar Revisión Técnica</h3>
            <p class="text-muted small mb-0">Evaluación para el grupo: <strong>Sistema de Inventario POS</strong></p>
        </div>
        <a href="{% url 'detalles_proyecto' %}" class="btn btn-outline-secondary fw-bold btn-sm shadow-sm">
            <i class="bi bi-arrow-left"></i> Cancelar
        </a>
    </div>

    <div class="card shadow-sm border-0 border-top border-4" style="border-top-color: #39A900 !important;">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Fecha de Revisión:</label>
                        <input type="date" class="form-control bg-light" value="2026-02-22" readonly>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Sprint / Hito Evaluado:</label>
                        <input type="text" class="form-control border-secondary-subtle" placeholder="Ej. Sprint 3 - Frontend" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Estado del Avance:</label>
                        <select class="form-select border-secondary-subtle fw-bold color-negro-suave-fn">
                            <option value="Aprobado" class="text-success">🟢 Al Día (Aprobado)</option>
                            <option value="Observaciones" class="text-warning">🟡 Requiere Ajustes</option>
                            <option value="Atrasado" class="text-danger">🔴 Atrasado (Crítico)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted text-uppercase">Retroalimentación y Hallazgos:</label>
                    <textarea class="form-control border-secondary-subtle" rows="6" placeholder="Escriba aquí sus observaciones técnicas, sugerencias de código o felicitaciones..."></textarea>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn color-verde-sena-bg text-white fw-bold px-5 py-2 shadow-sm">
                        <i class="bi bi-save me-2"></i>Guardar Evaluación
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
