<div class="d-flex justify-content-between align-items-end mb-4">
  <div>
    
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item">
          <a href="/" class="text-decoration-none text-success">Inicio</a>
        </li>
        
        {% for miga in breadcrumbs %}
            {% if not forloop.last %}
                <li class="breadcrumb-item">
                    <a href="{{ miga.url }}" class="text-decoration-none text-success">{{ miga.nombre }}</a>
                </li>
            {% else %}
                <li class="breadcrumb-item active" aria-current="page">{{ miga.nombre }}</li>
            {% endif %}
        {% endfor %}
        
      </ol>
    </nav>
  </div>
</div>
