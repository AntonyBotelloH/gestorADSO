{% load static %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Control - Gestor SENA</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <link href="{% static 'css/datatables.min.css' %}" rel="stylesheet" />
    <link href="{% static 'css/select2.min.css' %}" rel="stylesheet" />
    <script src="{% static 'js/jquery-4.0.0.min.js' %}"></script>

    <link rel="shortcut icon" href="{% static 'img/Logo.png' %}" type="image/x-icon" />

    <script>
      $(document).ready(function () {
        $('.form-select').select2({
          theme: 'bootstrap-5', // <--- La magia ocurre aquí
          width: '100%' // Mantiene el ancho correcto del grid
        })
      })
      
      // 1. Tema Oscuro y Tamaño de fuente (Se aplican a la raíz HTML al instante)
      const temaGlobal = localStorage.getItem('temaSena') || 'light'
      document.documentElement.setAttribute('data-bs-theme', temaGlobal)
      
      const sizeGlobal = localStorage.getItem('tamanoTextoSena') || '16'
      document.documentElement.style.fontSize = sizeGlobal + 'px'
      
      // 2. Alto Contraste (Se aplica al Body, espera a que el body exista)
      document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('altoContrasteSena') === 'true') {
          document.body.style.filter = 'contrast(150%) saturate(120%)'
          document.body.style.backgroundColor = '#000'
        }
      })
    </script>
  </head>

  <body class="bg-body-tertiary">
    <!-- CONTENEDOR PRINCIPAL -->
    <div class="d-flex min-vh-100">
      <!-- MENU LATERAL INICIO -->
      {% include 'partials/aside.html' %}
      <!-- MENU LATERAL FIN -->

      <div class="d-flex flex-column flex-grow-1 w-100">
        <!-- HEADER INICIO -->
        {% include 'partials/header.html' %}

        <!-- HEADER FIN -->

        <!-- CONTENIDO INICIO -->
        <main class="container-fluid p-4 overflow-auto">
          {% include 'partials/breadcrumbs.html' %}

          {% block content %}

          {% endblock %}
        </main>
        <!-- CONTENIDO FIN -->
      </div>
    </div>
    <script src="{% static 'js/sweetalert2.all.min.js' %}"></script>
    <script src="{% static 'js/select2.min.js' %}"></script>

    {% if messages %}
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          {% for message in messages %}
            // Imprimimos en consola para depurar (puedes borrar esto después)
            console.log("Django envió un mensaje: {{ message|escapejs }}");

            Swal.fire({
              title: "{% if message.tags == 'success' %}¡Completado!{% elif message.tags == 'error' %}¡Ups!{% elif message.tags == 'warning' %}Atención{% else %}Información{% endif %}",
              text: "{{ message|escapejs }}",
              icon: "{% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}info{% endif %}",
              confirmButtonColor: '#39A900',
              confirmButtonText: 'Aceptar',
            });
          {% endfor %}
        });
      </script>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}

    {% endblock %}
  </body>
</html>
