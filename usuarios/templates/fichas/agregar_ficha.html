{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container-fluid py-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4 bg-body-tertiary">
                
                <div class="card-header bg-transparent py-3 border-bottom border-secondary-subtle">
                    <h5 class="mb-0 fw-bold text-body">
                        <i class="bi bi-ui-radios me-2 color-verde-sena-fn"></i>Formulario de Registro
                    </h5>
                </div>
                
                <div class="card-body p-4 text-body">
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form|crispy }}
                        
                        <hr class="my-4 border-secondary opacity-25">

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'inicio_usuario' %}" class="btn btn-outline-secondary fw-bold px-4">
                                Cancelar
                            </a>
                            <button type="submit" class="btn color-verde-sena-bg text-white fw-bold px-4 shadow-sm">
                                <i class="bi bi-save me-1"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
