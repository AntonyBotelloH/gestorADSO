{% extends 'admin/base-admin.html' %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white fw-bold">
                    📝 Crear Nuevo Producto
                </div>
                <div class="card-body p-4">

                    <form action="" method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Producto:</label>
                            <input type="text" id="nombre" name="nombre" class="form-control" required placeholder="Ej: Hamburguesa Sencilla">
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción:</label>
                            <textarea id="descripcion" name="descripcion" rows="3" class="form-control" placeholder="Detalles del producto..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label fw-bold">Precio ($):</label>
                                <input type="number" step="0.01" id="precio" name="precio" class="form-control" required placeholder="0.00">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label fw-bold">Cantidad en Stock:</label>
                                <input type="number" id="stock" name="stock" value="0" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'listar_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary fw-bold">💾 Guardar Producto</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
{% endblock %}
