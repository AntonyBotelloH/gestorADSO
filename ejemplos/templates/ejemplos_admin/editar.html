{% extends 'admin/base-admin.html' %}
{% load l10n %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <div class="card shadow-sm border-0">
                <div class="card-header bg-warning text-dark fw-bold">
                    ✏️ Editar Producto: {{ producto.nombre }}
                </div>
                <div class="card-body p-4">

                    <form action="" method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre del Producto:</label>
                            <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="descripcion" class="form-label fw-bold">Descripción:</label>
                            <textarea id="descripcion" name="descripcion" rows="3" class="form-control">{{ producto.descripcion }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="precio" class="form-label fw-bold">Precio ($):</label>
                                <input type="number" step="0.01" id="precio" name="precio" value="{% localize off %}{{ producto.precio }}{% endlocalize %}" class="form-control" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="stock" class="form-label fw-bold">Cantidad en Stock:</label>
                                <input type="number" id="stock" name="stock" value="{{ producto.stock }}" class="form-control" required>
                            </div>
                        </div>

                        <div class="form-check form-switch mb-4 mt-2">
                            <input class="form-check-input" type="checkbox" role="switch" id="activo" name="activo" {% if producto.activo %}checked{% endif %}>
                            <label class="form-check-label text-success fw-bold" for="activo">
                                ¿Está activo y disponible para la venta?
                            </label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'listar_productos' %}" class="btn btn-outline-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-warning fw-bold">🔄 Actualizar Cambios</button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
{% endblock %}
